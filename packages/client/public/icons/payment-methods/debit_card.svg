<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
  <title>Debit Card</title>
  <defs>
    <clipPath id="dc-rounded">
      <rect width="24" height="24" rx="5" />
    </clipPath>
    <linearGradient id="dc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="dc-chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A" />
      <stop offset="1" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <g clip-path="url(#dc-rounded)">
    <!-- 背景铺满：与其他支付方式图标保持一致的“占位面积” -->
    <rect width="24" height="24" fill="url(#dc-bg)" />

    <!-- 分割线 / 高光 -->
    <rect x="0" y="10.8" width="24" height="1.9" fill="#FFFFFF" opacity="0.16" />
    <rect x="0" y="10.8" width="24" height="0.7" fill="#FFFFFF" opacity="0.14" />

    <!-- 芯片 -->
    <rect x="5.2" y="12.3" width="6.2" height="4.5" rx="1.1" fill="url(#dc-chip)" />
    <rect x="6.1" y="13.1" width="4.4" height="0.9" rx="0.45" fill="#FFFFFF" opacity="0.24" />

    <!-- 对勾：强调“借记/扣账” -->
    <path
      d="M14.2 14.5l1.25 1.25 3.35-3.35"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.95"
    />

    <!-- 轻微斜向高光 -->
    <path
      d="M-2 6.0C6.0 3.6 12.8 4.8 26 1.0v4.6C12.6 9.4 6.0 8.8-2 10.2V6.0z"
      fill="#FFFFFF"
      opacity="0.06"
    />
  </g>
</svg>
