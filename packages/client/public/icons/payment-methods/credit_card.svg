<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
  <title>Credit Card</title>
  <defs>
    <clipPath id="cc-rounded">
      <rect width="24" height="24" rx="5" />
    </clipPath>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB" />
      <stop offset="1" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="cc-chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A" />
      <stop offset="1" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <g clip-path="url(#cc-rounded)">
    <!-- 背景：铺满 24x24，避免在下拉/卡片里看起来“比其他图标小” -->
    <rect width="24" height="24" fill="url(#cc-bg)" />

    <!-- 磁条 / 高光 -->
    <rect x="0" y="7.6" width="24" height="2.8" fill="#FFFFFF" opacity="0.18" />
    <rect x="0" y="7.6" width="24" height="0.7" fill="#FFFFFF" opacity="0.16" />

    <!-- 芯片 -->
    <rect x="5.2" y="12.0" width="6.2" height="4.8" rx="1.1" fill="url(#cc-chip)" />
    <rect x="6.1" y="12.8" width="4.4" height="0.9" rx="0.45" fill="#FFFFFF" opacity="0.28" />
    <rect x="6.1" y="14.6" width="4.4" height="0.9" rx="0.45" fill="#FFFFFF" opacity="0.18" />

    <!-- 角标（双圆点）：小尺寸下更像“支付卡” -->
    <circle cx="17.1" cy="16.4" r="2.45" fill="#F87171" />
    <circle cx="19.1" cy="16.4" r="2.45" fill="#FBBF24" opacity="0.92" />

    <!-- 轻微斜向高光，提升质感（不影响辨识） -->
    <path
      d="M-2 5.2C6.3 2.8 12.6 4.0 26 0.2v4.8C12.2 9.1 6.2 8.3-2 10.0V5.2z"
      fill="#FFFFFF"
      opacity="0.06"
    />
  </g>
</svg>
