<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
  <title>Other</title>
  <defs>
    <clipPath id="other-rounded">
      <rect width="24" height="24" rx="5" />
    </clipPath>
  </defs>
  <g clip-path="url(#other-rounded)">
    <rect width="24" height="24" fill="#F3F4F6" />
    <rect x="0.75" y="0.75" width="22.5" height="22.5" rx="4.25" fill="none" stroke="#E5E7EB" />

    <!-- 多色“三点”表示“其他/更多” -->
    <circle cx="7.5" cy="12" r="2" fill="#EF4444" />
    <circle cx="12" cy="12" r="2" fill="#F59E0B" />
    <circle cx="16.5" cy="12" r="2" fill="#10B981" />
  </g>
</svg>
